<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hack Activated - Success</title>
    <style>
        body {
            background-color: #000; color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; text-align: center;
        }
        .success-card {
            background: rgba(0, 20, 0, 0.9); border: 2px solid #00ff00;
            padding: 30px; border-radius: 15px; box-shadow: 0 0 20px #00ff00;
            max-width: 400px; width: 90%;
        }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h2 { font-size: 22px; text-transform: uppercase; margin-bottom: 20px; text-shadow: 0 0 10px #00ff00; }
        p { color: #ffffff; line-height: 1.6; font-size: 14px; margin-bottom: 30px; }
        .payment-btn {
            display: block; background: #00ff00; color: #000;
            text-decoration: none; padding: 15px; font-weight: bold;
            border-radius: 8px; text-transform: uppercase;
            box-shadow: 0 0 10px #00ff00; transition: 0.3s;
        }
        .payment-btn:hover { background: #fff; box-shadow: 0 0 20px #fff; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon">✅</div>
        <h2>Hack Activated!</h2>
        <p>
            Your hack has been successfully activated. However, your previous payment record was not found in our database. Therefore, you are being redirected to the payment verification page.
        </p>
        <a href="h.html" class="payment-btn">Payment Page</a>
    </div>
</body>
</html>
