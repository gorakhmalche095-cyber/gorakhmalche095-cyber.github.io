<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunPower - Hacker Edition</title>
    <style>
        /* Matrix Animation Background */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden; /* Background animation sathi */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Main Card Styling */
        .main-card {
            background-color: rgba(188, 188, 188, 0.9); /* Transparent Grey */
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px #00ff00; /* Green Glow */
            height: 650px;
            border: 2px solid #00ff00;
            position: relative;
        }

        .header {
            background-color: #000;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid #00ff00;
        }
        .header img { width: 80px; filter: drop-shadow(0 0 5px #00ff00); }

        .yellow-banner {
            background-color: #fff176;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 15px;
            border-bottom: 1px solid #000;
        }

        .qr-container {
            background: white;
            margin: 20px auto;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #000;
        }
        .qr-container img { width: 160px; display: block; }

        .input-row {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        input {
            padding: 12px;
            border: 2px solid #000;
            width: 180px;
            font-size: 13px;
            outline: none;
            background: #fff;
            font-weight: bold;
        }
        .btn-submit {
            background: #000;
            color: #00ff00;
            border: 2px solid #000;
            padding: 0 15px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 5px #00ff00;
        }

        #status-box {
            text-align: center;
            height: 40px;
            margin-top: 15px;
        }
        .error-msg {
            color: #fff;
            background: #ff0000;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 10px red;
        }

        .footer-info {
            text-align: center;
            padding: 0 20px;
            margin-top: auto;
            margin-bottom: 15px;
            color: #000;
        }
        .instruction { font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .warning-text { font-style: italic; font-weight: bold; font-size: 12px; margin-top: 5px; }

        .support-btn {
            background: #ff0000;
            color: white;
            text-align: center;
            padding: 15px;
            margin: 0 25px 30px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 15px red;
            border: 2px solid #fff;
        }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="main-card">
    <div class="header">
        <img src="https://via.placeholder.com/90/000000/00ff00?text=HACKER" alt="Logo">
    </div>

    <div class="yellow-banner">PAYMENT METHOD 👇</div>

    <div class="qr-container">
        <img src="https://i.ibb.co/3XC06Ws/IMG-20260328-182248.jpg" alt="QR">
    </div>

    <div class="input-row">
        <input type="text" id="utr_input" placeholder="ENTER UTR NUMBER">
        <button class="btn-submit" onclick="verifyUTR()">SUBMIT✅</button>
    </div>

    <div id="status-box"></div>

    <div class="footer-info">
        <p class="instruction">ENTER UTR TO BYPASS SECURITY✅</p>
        <p class="warning-text">PAYMENT DONE ✅ BUT HACK NOT ACTIVE ❗</p>
    </div>

    <a href="https://T.me/SunPowerHelp" target="_blank" class="support-btn">CONTACT SUPPORT</a>
</div>

<script>
    // Matrix Rain Effect
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "0123456789ABCDEFHIJKLMNOPQRSTUVWXYZ@#$%&*";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];

    for (let i = 0; i < columns; i++) {
        drops[i] = 1;
    }

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#0F0"; // Green text
        ctx.font = fontSize + "px arial";

        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    setInterval(drawMatrix, 35);

    // Verification Logic
    function verifyUTR() {
        const val = document.getElementById("utr_input").value;
        const box = document.getElementById("status-box");

        if(val.trim() === "") {
            box.innerHTML = "<span class='error-msg'>UTR REQUIRED!</span>";
            return;
        }

        box.innerHTML = "<span style='color:#000; font-weight:bold;'>DECRYPTING...</span>";

        setTimeout(() => {
            box.innerHTML = "<span class='error-msg'>❌ PAYMENT NOT FOUND!</span>";
        }, 1500);
    }
</script>

</body>
</html>
